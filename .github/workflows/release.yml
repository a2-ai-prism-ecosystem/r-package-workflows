name: R Release Orchestrator

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release
        required: true
        type: string

jobs:
  release-linux:
    uses: ./.github/workflows/r-release-linux.yml
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    secrets: inherit
