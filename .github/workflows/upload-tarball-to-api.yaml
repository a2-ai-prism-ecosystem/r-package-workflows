name: Upload tarball to API

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
        description: "Name of the artifact to upload"
    secrets:
      PRISM_API_TOKEN:
        required: true
        description: "PRISM API token"

jobs:
  upload-tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}

      - name: Upload built tarball to API
        shell: bash
        env:
          PRISM_API_URL: ${{ vars.PRISM_API_URL }}
          PRISM_API_TOKEN: ${{ secrets.PRISM_API_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "$PRISM_API_URL" ]]; then
            echo "Error: PRISM_API_URL repository variable is not set."
            exit 1
          fi

          # linux/source
          shopt -s nullglob
          for tarball in *.tar.gz *.tgz *.zip; do
          # for tarball in *.tar.gz; do
            CHECKSUM=$(md5sum "$tarball" | cut -d' ' -f1)
            echo "Uploading $tarball (md5: $CHECKSUM)..."
            HTTP_CODE=$(curl -s -w "%{http_code}" -o response.json \
              -X POST "${PRISM_API_URL}/packages" \
              -H "Authorization: Bearer $PRISM_API_TOKEN" \
              --data-binary "@${tarball}")
            
            if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
              echo "Upload failed for $tarball with HTTP $HTTP_CODE"
              cat response.json
              exit 1
            fi
            echo "Uploaded $tarball (md5: $CHECKSUM) (HTTP $HTTP_CODE)"
          done

          echo "All uploads successful"
