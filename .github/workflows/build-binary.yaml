# TODO need to add logic using prism-data-build and include the source artifact as a build dependency
name: Build package binary

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      source-artifact:
        type: string
        description: "Source artifact to build binaries from (source tarball from build-source workflow)"
      build-ubuntu-jammy-x86-r43:
        type: boolean
        default: false
      build-ubuntu-jammy-x86-r44:
        type: boolean
        default: false
      build-ubuntu-jammy-x86-r45:
        type: boolean
        default: false
      build-ubuntu-noble-x86-r43:
        type: boolean
        default: false
      build-ubuntu-noble-x86-r44:
        type: boolean
        default: false
      build-ubuntu-noble-x86-r45:
        type: boolean
        default: false
      build-macos-arm-r44:
        type: boolean
        default: false
      build-macos-arm-r45:
        type: boolean
        default: false
      build-rhel-9-x86-r44:
        type: boolean
        default: false
      build-rhel-9-x86-r45:
        type: boolean
        default: false
      build-rhel-8-x86-r44:
        type: boolean
        default: false
      build-rhel-8-x86-r45:
        type: boolean
        default: false
      build-almalinux-8-x86-r44:
        type: boolean
        default: false
      build-almalinux-8-x86-r45:
        type: boolean
        default: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has-builds: ${{ steps.build-matrix.outputs.has-builds }}
    steps:
      - name: Checkout workflow-templates for platform config
        uses: actions/checkout@v4
        with:
          repository: a2-ai-prism-ecosystem/r-package-workflows
          sparse-checkout: .github/workflows/platform-matrix.json
          sparse-checkout-cone-mode: false

      - name: Build matrix from inputs
        id: build-matrix
        run: |
          set -euo pipefail
          
          # Load the platform config
          PLATFORMS=$(cat .github/workflows/platform-matrix.json)
          
          # Get all inputs as JSON
          INPUTS='${{ toJson(inputs) }}'
          
          # Filter to only enabled platforms
          MATRIX=$(echo "$PLATFORMS" | jq --argjson inputs "$INPUTS" '
            to_entries
            | map(select($inputs[.key] == true))
            | map(.value)
            | {include: .}
          ')
          
          # Check if any builds are enabled
          COUNT=$(echo "$MATRIX" | jq '.include | length')
          if [[ "$COUNT" -eq 0 ]]; then
            echo "No platforms enabled"
            echo "has-builds=false" >> "$GITHUB_OUTPUT"
            # Output empty matrix to avoid workflow error
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
          else
            echo "Enabled $COUNT platform(s)"
            echo "has-builds=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$(echo "$MATRIX" | jq -c '.')" >> "$GITHUB_OUTPUT"
          fi
          
          echo "Matrix:"
          echo "$MATRIX" | jq '.'

  build-binary:
    needs: setup
    if: ${{ needs.setup.outputs.has-builds == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.source-artifact }}
          path: source-tarball/

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          
          TARBALL=$(ls source-tarball/*.tar.gz | head -n 1)
          PKG_NAME=$(basename "$TARBALL" | cut -d'_' -f1)
          PKG_VERSION=$(basename "$TARBALL" | cut -d'_' -f2 | sed 's/\.tar\.gz//')
          
          echo "Building binary from: $TARBALL"
          R CMD INSTALL --build "$TARBALL"
          
          # Find and rename the output
          # R produces different extensions per platform
          BINARY=$(ls *.tar.gz *.tgz *.zip 2>/dev/null | grep -v "^source-tarball" | head -n 1)
          EXT="${BINARY##*.}"
          
          NEW_NAME="${PKG_NAME}_${PKG_VERSION}_${{ matrix.os-name }}_${{ matrix.os-version }}_${{ matrix.arch }}_R${{ matrix.r-version }}.${EXT}"
          mv "$BINARY" "$NEW_NAME"
          
          echo "Built: $NEW_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-tarball-${{ matrix.os-name }}-${{ matrix.os-version }}-${{ matrix.arch }}-R${{ matrix.r-version }}
          path: |
            *.tar.gz
            *.tgz
            *.zip
          if-no-files-found: error

  collect-binary-archives:
    needs: [setup, build-binary]
    if: ${{ needs.setup.outputs.has-builds == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-tarball-*
          merge-multiple: true
          path: binaries/

      - uses: actions/upload-artifact@v4
        with:
          name: binary-tarballs
          path: binaries/*