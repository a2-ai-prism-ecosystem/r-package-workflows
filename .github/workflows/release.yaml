name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    if: github.repository != 'a2-ai-prism-ecosystem/r-package-workflows'
    # ============================================================
    # Uncomment ONE release workflow:
    # ============================================================
    # create release
    uses: a2-ai-prism-ecosystem/r-package-workflows/.github/workflows/release-base.yaml@devel
    # create release, build and upload to PRISM
    # uses: a2-ai-prism-ecosystem/r-package-workflows/.github/workflows/release-with-api.yaml@devel
    # create release, build and upload to PRISM, creating an individual package edition as well
    # uses: a2-ai-prism-ecosystem/r-package-workflows/.github/workflows/release-with-api-and-individual-package-edition.yaml@devel

    # ============================================================
    # Uncomment the "with" section to enable binary building for your R package:
    # ============================================================
    # with:
      # ============================================================
      # Uncomment the platform + R version combinations you want:
      # ============================================================
      
      # Ubuntu 22.04
      # build-ubuntu-jammy-x86-r43: true
      # build-ubuntu-jammy-x86-r44: true
      # build-ubuntu-jammy-x86-r45: true
      
      # Ubuntu 24.04
      # build-ubuntu-noble-x86-r43: true
      # build-ubuntu-noble-x86-r44: true
      # build-ubuntu-noble-x86-r45: true
      
      # macOS Apple Silicon (arm64)
      # build-macos-arm-r44: true
      # build-macos-arm-r45: true

      # RHEL 9
      # build-rhel-9-x86-r44: true
      # build-rhel-9-x86-r45: true

      # RHEL 8
      # build-rhel-8-x86-r44: true
      # build-rhel-8-x86-r45: true

      # AlmaLinux 8
      # build-almalinux-8-x86-r44: true
      # build-almalinux-8-x86-r45: true

    secrets: inherit